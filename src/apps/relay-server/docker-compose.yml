version: '3.8'

services:
  relay-server:
    build:
      context: ../../..
      dockerfile: src/apps/relay-server/Dockerfile
    container_name: bitfun-relay
    restart: unless-stopped
    ports:
      - "9700:9700"
    environment:
      - RELAY_PORT=9700
      - RELAY_STATIC_DIR=/app/static
      - RELAY_ROOM_TTL=3600
    volumes:
      - relay-data:/app/data

  # Caddy reverse proxy for automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: bitfun-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relay-server

volumes:
  relay-data:
  caddy-data:
  caddy-config:
